target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B904",  # raise from in except — too noisy with Celery retry patterns
    "F405",  # may be undefined from star imports — used in settings/prod.py
]

[lint.isort]
known-first-party = ["apps", "config"]
