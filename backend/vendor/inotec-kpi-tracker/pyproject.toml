[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "inotec-kpi-tracker"
version = "1.0.0"
description = "Python SDK for tracking KPI events in server applications"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "coverage>=7.0.0",
]
django = [
    "django>=4.2",
]
fastapi = [
    "fastapi>=0.111.0",
    "starlette>=0.37.0",
]

[tool.hatch.build.targets.wheel]
packages = ["inotec_kpi_tracker"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["inotec_kpi_tracker"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
