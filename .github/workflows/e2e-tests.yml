name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-tests.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-tests.yml"

jobs:
  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pmtool_test
          POSTGRES_USER: pmtool
          POSTGRES_PASSWORD: pmtool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pmtool"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-e2e-secret-key
      POSTGRES_DB: pmtool_test
      POSTGRES_USER: pmtool
      POSTGRES_PASSWORD: pmtool
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ hashFiles('backend/requirements/dev.txt') }}
          restore-keys: pip-e2e-

      - name: Install backend dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libpq-dev
          pip install -r backend/requirements/dev.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Start backend server
        working-directory: backend
        run: python manage.py runserver 0.0.0.0:8000 &

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/api/docs/ > /dev/null && break
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
